name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "k8s-dashboard-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "k8s-dashboard-frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: k8s-dashboard-frontend

jobs:
  ci:
    name: Lint · Type Check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: k8s-dashboard-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCK_DATA: true
